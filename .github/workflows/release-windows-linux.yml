name: Release Windows & Linux

# electron-builder's Windows (NSIS) and Linux (AppImage) targets are built
# here rather than locally, since `scripts/release.sh` runs on a macOS dev
# machine. This is dispatched by that script right after it publishes the
# macOS build, targeting the same tag/version, so all three platforms land
# on one GitHub release. Safe to re-run: uploads use --clobber.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload to (e.g. v0.9.1)"
        required: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build (Azure Trusted Signing, else CSC_LINK, else unsigned)
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          AZURE_CERT_PROFILE: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
          AZURE_PUBLISHER_NAME: ${{ vars.AZURE_PUBLISHER_NAME }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_CODE_SIGNING_ACCOUNT" ]; then
            echo "==> Signing via Azure Trusted Signing ($AZURE_CODE_SIGNING_ACCOUNT/$AZURE_CERT_PROFILE)"
            npx electron-builder --win --publish never \
              --config.win.azureSignOptions.publisherName="$AZURE_PUBLISHER_NAME" \
              --config.win.azureSignOptions.endpoint="$AZURE_ENDPOINT" \
              --config.win.azureSignOptions.certificateProfileName="$AZURE_CERT_PROFILE" \
              --config.win.azureSignOptions.codeSigningAccountName="$AZURE_CODE_SIGNING_ACCOUNT"
          elif [ -n "$CSC_LINK" ]; then
            echo "==> Signing via CSC_LINK (traditional Authenticode cert)"
            npx electron-builder --win --publish never
          else
            echo "::warning::No Windows signing configured (neither AZURE_CLIENT_ID/AZURE_CODE_SIGNING_ACCOUNT_NAME nor CSC_LINK are set) — building an UNSIGNED installer. Users will see a SmartScreen 'unknown publisher' warning."
            npx electron-builder --win --publish never
          fi

      - name: Verify build artifacts
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for f in "dist/Bowser Setup $VERSION.exe" "dist/Bowser Setup $VERSION.exe.blockmap" "dist/latest.yml"; do
            [ -f "$f" ] || { echo "Expected build artifact missing: $f" >&2; exit 1; }
          done

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "${{ inputs.tag }}" \
            "dist/Bowser Setup $VERSION.exe" \
            "dist/Bowser Setup $VERSION.exe.blockmap" \
            "dist/latest.yml" \
            --repo "${{ github.repository }}" --clobber

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build
        run: npx electron-builder --linux --publish never

      - name: Verify build artifacts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for f in "dist/Bowser-$VERSION-x86_64.AppImage" "dist/Bowser-$VERSION-x86_64.AppImage.blockmap" "dist/latest-linux.yml"; do
            [ -f "$f" ] || { echo "Expected build artifact missing: $f" >&2; exit 1; }
          done

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "${{ inputs.tag }}" \
            "dist/Bowser-$VERSION-x86_64.AppImage" \
            "dist/Bowser-$VERSION-x86_64.AppImage.blockmap" \
            "dist/latest-linux.yml" \
            --repo "${{ github.repository }}" --clobber
